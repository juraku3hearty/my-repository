<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整骨院 自動化診断 — タップで5分</title>
<style>
  :root{
    --bg:#0c0e12; --panel:#14171e; --line:#262b36; --txt:#e8eaf0;
    --muted:#8a93a6; --accent:#5ee0c0; --accent2:#7aa2ff; --hi:#ff6b6b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    line-height:1.7;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto;padding:40px 18px 96px}
  .eyebrow{font-family:ui-monospace,Menlo,monospace;letter-spacing:.3em;
    font-size:11px;color:var(--accent);text-transform:uppercase}
  h1{font-size:27px;margin:8px 0 6px;letter-spacing:.02em}
  .lead{color:var(--muted);font-size:14.5px;margin:0 0 30px}
  /* 質問カード */
  .q{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:18px 18px 16px;margin:0 0 14px}
  .qno{font-family:ui-monospace,monospace;color:var(--accent2);font-size:11px;letter-spacing:.2em}
  .qttl{font-size:16.5px;font-weight:600;margin:5px 0 4px}
  .qsub{font-size:12px;color:var(--muted);margin:0 0 12px}
  .qsub.multi{color:var(--accent)}
  .opts{display:flex;flex-wrap:wrap;gap:8px}
  .opt{border:1px solid var(--line);background:#0f1218;color:var(--txt);
    border-radius:99px;padding:9px 15px;font-size:14px;cursor:pointer;
    user-select:none;transition:.12s;font-family:inherit}
  .opt:active{transform:scale(.97)}
  .opt.on{background:linear-gradient(135deg,rgba(94,224,192,.22),rgba(122,162,255,.22));
    border-color:var(--accent);color:#fff;font-weight:600}
  .btn{display:block;width:100%;border:0;border-radius:12px;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04110d;
    font-weight:700;font-size:16px;padding:16px;margin-top:18px}
  .btn:active{transform:translateY(1px)}
  .progress{position:sticky;top:0;background:var(--bg);padding:10px 0 6px;
    margin:-40px -18px 18px;z-index:5}
  .bar{height:4px;background:var(--line);border-radius:99px;margin:0 18px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:.3s}
  .pcount{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);
    text-align:right;margin:6px 18px 0}
  /* レポート */
  #report{display:none}
  .rep-head{text-align:center;margin:6px 0 24px}
  .rep-head h2{font-size:23px;margin:8px 0 4px}
  .rep-head p{color:var(--muted);font-size:14px;margin:0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:18px;margin:0 0 14px;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .card.p-hi::before{background:var(--hi)}
  .card.p-mid::before{background:var(--accent2)}
  .pri{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;
    padding:3px 9px;border-radius:99px;margin-bottom:8px}
  .pri.hi{background:rgba(255,107,107,.15);color:var(--hi)}
  .pri.mid{background:rgba(122,162,255,.15);color:var(--accent2)}
  .pri.low{background:rgba(94,224,192,.15);color:var(--accent)}
  .card h3{font-size:17px;margin:2px 0 8px}
  .ba{font-size:14px;margin:0 0 10px}
  .ba .arrow{color:var(--accent)}
  .meta{display:flex;gap:18px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);
    border-top:1px dashed var(--line);padding-top:10px}
  .meta b{color:var(--txt);font-weight:600}
  .cta{background:linear-gradient(135deg,rgba(94,224,192,.12),rgba(122,162,255,.12));
    border:1px solid var(--line);border-radius:16px;padding:24px;text-align:center;margin-top:26px}
  .cta h3{margin:0 0 6px;font-size:19px}
  .cta p{color:var(--muted);font-size:14px;margin:0 0 16px}
  .line-btn{display:inline-block;background:#06c755;color:#fff;text-decoration:none;
    font-weight:700;padding:13px 28px;border-radius:99px;font-size:15px}
  .restart{display:block;text-align:center;color:var(--muted);font-size:13px;
    margin-top:22px;background:none;border:0;cursor:pointer;width:100%}
  .note{font-size:11.5px;color:var(--muted);text-align:center;margin-top:30px;
    border-top:1px solid var(--line);padding-top:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="progress">
    <div class="bar"><i id="bar"></i></div>
    <div class="pcount" id="pcount"></div>
  </div>

  <!-- ====== 質問（タップ式） ====== -->
  <section id="form">
    <span class="eyebrow">Automation Diagnosis</span>
    <h1>整骨院 自動化診断</h1>
    <p class="lead">タップで答えるだけ。約2分で、院の「自動化できる業務」が分かります。</p>
    <div id="questions"></div>
    <button class="btn" onclick="diagnose()">診断する →</button>
  </section>

  <!-- ====== 結果 ====== -->
  <section id="report">
    <div class="rep-head">
      <span class="eyebrow">Diagnosis Report</span>
      <h2>あなたの院の自動化候補</h2>
      <p id="rep-sub"></p>
    </div>
    <div id="cards"></div>
    <div class="cta">
      <h3>いま、この中の1本を無料で作ります</h3>
      <p>「100チャレ」枠で、診断結果から1業務を無料で自動化。<br>
        LINEで友だち追加して、この結果を送ってください。</p>
      <a class="line-btn" href="#" onclick="return false">LINEで友だち追加 →</a>
    </div>
    <button class="restart" onclick="location.reload()">↺ もう一度診断する</button>
  </section>

  <p class="note">
    ※ デモ版です。タップした回答からおすすめ候補を算出しています。<br>
    本番は回答とお問い合わせをスプレッドシートに自動保存し、AIで提案文を生成します。
  </p>
</div>

<script>
// ===== 8つの自動化メニュー（候補） =====
const MENUS = {
  remind:{ttl:"予約リマインドLINE自動送信",
    ba:"電話し忘れて無断キャンセル <span class='arrow'>→</span> 前日にLINEで自動リマインド",
    eff:"目安 1〜2日", fee:"Tier1 ¥9,800〜（月額API ¥0）"},
  monshin:{ttl:"来院前WEB問診 → シート自動集約",
    ba:"受付で紙の問診を記入 <span class='arrow'>→</span> 来院前にスマホ入力、自動でシート集約",
    eff:"目安 2〜3日", fee:"Tier1 ¥9,800〜"},
  review:{ttl:"口コミ新着監視 ＋ AI返信文案",
    ba:"口コミに気づかず放置 <span class='arrow'>→</span> 新着をLINE通知＋AIが返信文案を生成",
    eff:"目安 2日", fee:"Tier1 ¥9,800〜"},
  digest:{ttl:"朝の経営ダイジェスト",
    ba:"数字を毎回手集計 <span class='arrow'>→</span> 前日売上・本日予約・来院数を朝LINE1通",
    eff:"目安 1〜2日", fee:"Tier1 ¥9,800〜"},
  cancel:{ttl:"キャンセル枠の自動再募集",
    ba:"空き枠が埋まらない <span class='arrow'>→</span> キャンセル発生→待ち客へ自動で空き案内",
    eff:"目安 2〜3日", fee:"Tier2 ¥48,000〜"},
  stock:{ttl:"物販・備品の発注アラート",
    ba:"気づいたら在庫切れ <span class='arrow'>→</span> しきい値を割ったらLINEで発注リマインド",
    eff:"目安 1〜2日", fee:"Tier1 ¥9,800〜"},
  receipt:{ttl:"領収書・レシート → 経費シート",
    ba:"領収書を手入力 <span class='arrow'>→</span> 写真を送るとAIが読み取り、経費シートへ自動転記",
    eff:"目安 1〜2日", fee:"Tier1 ¥9,800〜"},
  nippo:{ttl:"スタッフ日報AI集約",
    ba:"日報を読む時間がない <span class='arrow'>→</span> 各自の日報をAIが要約、院長向けダイジェストに",
    eff:"目安 2日", fee:"Tier1 ¥9,800〜"},
};

// ===== 8つの質問（タップ選択）。各選択肢が候補にスコア加算 =====
const QUESTIONS = [
  {n:"Q01", t:"院の規模は？", sub:"1つ選んでください", multi:false,
   opts:[ {l:"1人院", s:{nippo:0}}, {l:"2〜3人", s:{nippo:1}}, {l:"4人以上", s:{nippo:2}} ]},
  {n:"Q02", t:"いま一番ストレスな業務は？", sub:"当てはまるもの全部タップ", multi:true,
   opts:[ {l:"予約・電話対応", s:{remind:3, cancel:2}}, {l:"受付・問診", s:{monshin:3}},
          {l:"会計・経費", s:{receipt:3, digest:1}}, {l:"口コミ・集客", s:{review:3}},
          {l:"在庫・物販", s:{stock:3}}, {l:"スタッフ管理", s:{nippo:3}} ]},
  {n:"Q03", t:"予約管理の方法は？", sub:"1つ選んでください", multi:false,
   opts:[ {l:"紙・電話だけ", s:{remind:2, monshin:2}}, {l:"Googleカレンダー等", s:{remind:1}},
          {l:"予約システム導入済み", s:{}} ]},
  {n:"Q04", t:"無断キャンセル・予約忘れは？", sub:"1つ選んでください", multi:false,
   opts:[ {l:"よくある", s:{remind:3, cancel:2}}, {l:"たまに", s:{remind:1}}, {l:"ほぼ無い", s:{}} ]},
  {n:"Q05", t:"患者さんとの連絡は？", sub:"1つ選んでください", multi:false,
   opts:[ {l:"電話だけ", s:{remind:1}}, {l:"LINEを使ってる", s:{remind:1, cancel:1}}, {l:"メール中心", s:{}} ]},
  {n:"Q06", t:"Google・エキテンの口コミチェックは？", sub:"1つ選んでください", multi:false,
   opts:[ {l:"見てない", s:{review:3}}, {l:"たまに", s:{review:1}}, {l:"毎日見てる", s:{}} ]},
  {n:"Q07", t:"領収書・経費の処理は？", sub:"1つ選んでください", multi:false,
   opts:[ {l:"手入力で大変", s:{receipt:3}}, {l:"そこそこ", s:{receipt:1}}, {l:"税理士任せ", s:{}} ]},
  {n:"Q08", t:"院長への報告（売上・来院数）は？", sub:"1つ選んでください", multi:false,
   opts:[ {l:"毎回手集計", s:{digest:3}}, {l:"なんとなく", s:{digest:1}}, {l:"仕組み化済み", s:{}} ]},
];

// 候補の表示順（同点はこの優先度で）
const ORDER = ["remind","receipt","review","digest","monshin","cancel","stock","nippo"];

const answers = {}; // qIndex -> Set(optIndex)
const qWrap = document.getElementById("questions");
QUESTIONS.forEach((q,qi)=>{
  answers[qi] = new Set();
  const optsHtml = q.opts.map((o,oi)=>`<button class="opt" data-q="${qi}" data-o="${oi}">${o.l}</button>`).join("");
  qWrap.insertAdjacentHTML("beforeend",
    `<div class="q">
       <span class="qno">${q.n}</span>
       <div class="qttl">${q.t}</div>
       <div class="qsub ${q.multi?'multi':''}">${q.multi?'＝ '+q.sub:q.sub}</div>
       <div class="opts">${optsHtml}</div>
     </div>`);
});

qWrap.addEventListener("click", e=>{
  const b = e.target.closest(".opt"); if(!b) return;
  const qi = +b.dataset.q, oi = +b.dataset.o, q = QUESTIONS[qi];
  if(q.multi){
    if(answers[qi].has(oi)){ answers[qi].delete(oi); b.classList.remove("on"); }
    else { answers[qi].add(oi); b.classList.add("on"); }
  } else {
    answers[qi].clear(); answers[qi].add(oi);
    [...b.parentNode.children].forEach(c=>c.classList.remove("on"));
    b.classList.add("on");
  }
  updateProgress();
});

function updateProgress(){
  const done = Object.values(answers).filter(s=>s.size>0).length;
  document.getElementById("bar").style.width = (done/QUESTIONS.length*100)+"%";
  document.getElementById("pcount").textContent = done+" / "+QUESTIONS.length+" 回答";
}
updateProgress();

function diagnose(){
  const done = Object.values(answers).filter(s=>s.size>0).length;
  if(done < QUESTIONS.length){ alert("すべての質問に答えてください（残り "+(QUESTIONS.length-done)+" 問）"); return; }

  // スコア集計
  const score = {}; Object.keys(MENUS).forEach(k=>score[k]=0);
  QUESTIONS.forEach((q,qi)=> answers[qi].forEach(oi=>{
    const s = q.opts[oi].s; for(const k in s) score[k]+=s[k];
  }));

  // 並び替え：スコア desc → ORDER優先
  const ranked = ORDER.slice().sort((a,b)=> score[b]-score[a] || ORDER.indexOf(a)-ORDER.indexOf(b));
  const hit = ranked.filter(k=>score[k]>0);
  const top = ranked.slice(0, Math.max(3, Math.min(5, hit.length)));

  const cards = document.getElementById("cards"); cards.innerHTML="";
  top.forEach((k,rank)=>{
    const m = MENUS[k];
    const lvl = rank===0 ? ["hi","高","p-hi"] : rank<=2 ? ["mid","中","p-mid"] : ["low","低",""];
    cards.insertAdjacentHTML("beforeend",
      `<div class="card ${lvl[2]}">
         <span class="pri ${lvl[0]}">優先度 ${lvl[1]}</span>
         <h3>${rank+1}. ${m.ttl}</h3>
         <p class="ba">${m.ba}</p>
         <div class="meta"><span><b>${m.eff}</b></span><span>${m.fee}</span></div>
       </div>`);
  });
  document.getElementById("rep-sub").textContent = `優先度の高い順に ${top.length} 件をご提案します`;

  // 本番ではここで回答をGAS WebアプリにPOST→スプレッドシート保存
  document.getElementById("form").style.display="none";
  document.getElementById("report").style.display="block";
  window.scrollTo({top:0, behavior:"smooth"});
}
</script>
</body>
</html>
