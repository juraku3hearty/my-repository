<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>店頭販売スキャン</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;background:#0f172a;color:#e2e8f0}
  .wrap{max-width:480px;margin:0 auto;padding:12px}
  h1{font-size:17px;margin:6px 2px 10px;display:flex;align-items:center;gap:8px}
  #view{position:relative;width:100%;aspect-ratio:3/4;background:#000;border-radius:16px;overflow:hidden}
  #video{width:100%;height:100%;object-fit:cover}
  .frame{position:absolute;inset:18% 10%;border:3px solid #38bdf8;border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.25)}
  .start{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;background:rgba(15,23,42,.85)}
  .start button{background:#38bdf8;color:#04283b;border:none;border-radius:14px;font-size:18px;font-weight:800;padding:14px 28px}
  .hint{color:#94a3b8;font-size:12px}
  .status{margin:10px 2px;min-height:46px;border-radius:12px;padding:10px 12px;font-weight:700;background:#1e293b}
  .ok{background:#064e3b;color:#bbf7d0}
  .warn{background:#7c2d12;color:#fed7aa}
  .qtyrow{display:flex;align-items:center;gap:10px;margin:8px 2px}
  .qtyrow span{font-size:13px;color:#94a3b8}
  .qbtn{width:44px;height:44px;border-radius:12px;border:none;background:#334155;color:#fff;font-size:22px;font-weight:800}
  .qval{font-size:22px;font-weight:800;min-width:34px;text-align:center}
  .manual{display:flex;gap:8px;margin:10px 2px}
  .manual input{flex:1;border:none;border-radius:12px;padding:12px;font-size:16px;background:#1e293b;color:#fff}
  .manual button{border:none;border-radius:12px;background:#334155;color:#fff;font-weight:700;padding:0 16px}
  .log{margin:10px 2px 30px}
  .log h2{font-size:13px;color:#94a3b8;margin:6px 0}
  .item{display:flex;justify-content:space-between;background:#1e293b;border-radius:10px;padding:9px 12px;margin:6px 0;font-size:14px}
  .item b{color:#7dd3fc}
</style>
</head>
<body>
<div class="wrap">
  <h1>📷 店頭販売スキャン</h1>

  <div id="view">
    <video id="video" playsinline muted></video>
    <div class="frame"></div>
    <div class="start" id="startOverlay">
      <button onclick="startScan()">スキャン開始</button>
      <div class="hint">カメラの使用を「許可」してください</div>
    </div>
  </div>

  <div class="status" id="status">バーコードを枠に合わせてください</div>

  <div class="qtyrow">
    <span>本数</span>
    <button class="qbtn" onclick="addQty(-1)">−</button>
    <div class="qval" id="qty">1</div>
    <button class="qbtn" onclick="addQty(1)">＋</button>
    <span>（スキャンするとこの本数で記録）</span>
  </div>

  <div class="manual">
    <input id="manualJan" type="number" inputmode="numeric" placeholder="読めない時はJANを手入力">
    <button onclick="sendManual()">記録</button>
  </div>

  <div class="log">
    <h2>今日の記録（最近）</h2>
    <div id="logList"></div>
  </div>
</div>

<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
  let reader = null, lastCode = '', lastTime = 0, qty = 1, count = 0;
  const statusEl = document.getElementById('status');

  function addQty(d){ qty = Math.max(1, qty + d); document.getElementById('qty').textContent = qty; }

  function startScan(){
    document.getElementById('startOverlay').style.display = 'none';
    setStatus('カメラ起動中…', '');
    reader = new ZXing.BrowserMultiFormatReader();
    reader.decodeFromVideoDevice(null, 'video', function(result, err){
      if (result){
        const code = result.getText().replace(/\D/g,'');
        const now = Date.now();
        if (code && (code !== lastCode || now - lastTime > 1800)){
          lastCode = code; lastTime = now;
          beep();
          send(code, qty);
        }
      }
    }).catch(function(e){ setStatus('カメラを起動できません：' + e, 'warn'); });
  }

  function sendManual(){
    const j = document.getElementById('manualJan').value.replace(/\D/g,'');
    if (!j){ setStatus('JANを入力してください', 'warn'); return; }
    document.getElementById('manualJan').value = '';
    send(j, qty);
  }

  function send(jan, q){
    setStatus('記録中… ' + jan, '');
    if (typeof google !== 'undefined' && google.script && google.script.run){
      google.script.run
        .withSuccessHandler(function(r){ onSaved(r, jan, q); })
        .withFailureHandler(function(e){ setStatus('エラー：' + e.message, 'warn'); })
        .saveSale(jan, q);
    } else {
      onSaved({ ok:true, unknown:false, name:'(プレビュー)', jan:jan, qty:q }, jan, q); // ローカルプレビュー
    }
  }

  function onSaved(r, jan, q){
    if (!r || !r.ok){ setStatus((r && r.msg) || '記録できませんでした', 'warn'); return; }
    count += q;
    if (r.unknown){
      setStatus('⚠ 未登録の商品（JAN:' + jan + '）を記録。あとで「対応表」に商品コードを入れてください', 'warn');
      addLog('未登録 (' + jan + ')', q);
    } else {
      setStatus('✓ ' + r.name + ' を ' + q + '本 記録（本日計 ' + count + '）', 'ok');
      addLog(r.name, q);
    }
  }

  function addLog(name, q){
    const el = document.getElementById('logList');
    const d = document.createElement('div'); d.className = 'item';
    d.innerHTML = '<span>' + name + '</span><b>×' + q + '</b>';
    el.insertBefore(d, el.firstChild);
  }

  function setStatus(t, cls){ statusEl.textContent = t; statusEl.className = 'status' + (cls ? ' ' + cls : ''); }

  // 軽い「ピッ」音
  function beep(){
    try {
      const c = new (window.AudioContext || window.webkitAudioContext)();
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination); o.frequency.value = 880; o.start();
      g.gain.setValueAtTime(.2, c.currentTime); g.gain.exponentialRampToValueAtTime(.001, c.currentTime + .12);
      o.stop(c.currentTime + .13);
    } catch(e){}
  }
</script>
</body>
</html>
